<h2>My Projects</h2>
<p>{{ projects.length }}</p>
@for (project of projects; track project.title) {
  <div>
    <h3>{{ project.title }}</h3>
    <p>{{ project.description }}</p>
    <p>{{ project.technologies.join(', ') }}</p>
    <a [href]="project.github" target="_blank">See on GitHub</a>
  </div>
}
